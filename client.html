<head>
    <link rel="stylesheet" href="https://nexaflowdigital.com/assets/css/main.css">
</head>

<section class="contact-premium">
    <div id="login" class="contact-panel">
        <div class="contact-copy">
            <p class="contact-kicker">Client Portal</p>
            <h2>Access your account.</h2>
            <p class="contact-lead">
                Enter your email and we’ll send you a secure login link to view your services and submit support requests.
            </p>
        </div>

        <div class="contact-form contact-form-premium">
            <div class="form-grid">
                <input type="email" id="email" class="box full" placeholder="Enter your email" required />
            </div>

            <div class="contact-bottom">
                <button type="button" onclick="sendLink()" class="btn">Send Login Link</button>
                <span id="msg" class="alert"></span>
            </div>
        </div>
    </div>

    <div id="dashboard" class="contact-panel" style="display:none;">
        <div class="contact-copy">
            <p class="contact-kicker">Welcome Back</p>
            <h2><span id="name"></span></h2>
            <p class="contact-lead">
                <strong>Business:</strong> <span id="business"></span>
            </p>

            <div class="contact-points" id="services"></div>
        </div>

        <div class="contact-form contact-form-premium">
            <p class="contact-kicker">Support</p>
            <h2 style="font-size:3.2rem; margin-bottom:1rem;">Need help?</h2>
            <p class="contact-lead" style="margin-bottom:1.6rem;">
                Submit a request and it will be tied to your account details automatically.
            </p>

            <div class="contact-bottom" style="margin-top:0;">
                <button type="button" class="btn" onclick="showTicketForm()">Submit Support Ticket</button>
            </div>

            <form id="ticketForm" style="display:none; margin-top:2rem;">
                <div class="form-grid">
                    <select id="requestType" class="box full" required>
                        <option value="" disabled selected>Select Request Type</option>
                        <option>Content Update</option>
                        <option>Design Update</option>
                        <option>New Feature</option>
                        <option>Technical Issue</option>
                        <option>Other</option>
                    </select>

                    <textarea id="ticketMessage" class="box full" placeholder="Provide details of your request here..." required></textarea>
                </div>

                <div class="contact-bottom">
                    <button type="button" class="btn" onclick="submitTicket()">Submit Request</button>
                    <span id="ticketMsg" class="alert"></span>
                </div>
            </form>
        </div>
    </div>
</section>

<script>
const PORTAL_ENDPOINT = 'https://script.google.com/macros/s/AKfycby_dUmcktvomVuZGAoqsa6Vldj1QYLLbBnre82jVQagToU-tc8tp7N3hCok8qKsgBRo/exec';
const TICKET_ENDPOINT = 'https://script.google.com/macros/s/AKfycbwxjnlJaYCNCDM-CJ1GRuqTM6JmdeXrnXODVCG7EwJu2-JM2B_2Cobwc4S1vk5yMO9R/exec';

let currentUser = null;

function sendLink(){
    const email = document.getElementById('email').value.trim();
    const msg = document.getElementById('msg');

    if(!email){
        msg.textContent = 'Enter your email.';
        return;
    }

    msg.textContent = 'Please wait...';

    fetch(PORTAL_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            action: 'send_link',
            email: email
        })
    })
    .then(res => res.json())
    .then(() => {
        msg.textContent = 'Check your email for your login link.';
    })
    .catch(() => {
        msg.textContent = 'Something went wrong.';
    });
}

const params = new URLSearchParams(window.location.search);
const token = params.get('token');

if (token) {
    document.getElementById('login').style.display = 'none';
    document.getElementById('dashboard').style.display = 'grid';
    document.getElementById('name').textContent = 'Loading...';

    fetch(PORTAL_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            action: 'verify_token',
            token: token
        })
    })
    .then(res => res.json())
    .then(data => {
        if (!data.success) {
            throw new Error('Invalid token');
        }

        currentUser = data;

        document.getElementById('name').textContent = data.name;
        document.getElementById('business').textContent = data.business || '';

        const servicesWrap = document.getElementById('services');
        servicesWrap.innerHTML = '';

        (data.services || '').split(',').forEach(service => {
            if (service.trim()) {
                const item = document.createElement('div');
                item.className = 'contact-point';
                item.innerHTML = '<i class="fas fa-check"></i><span>' + service.trim() + '</span>';
                servicesWrap.appendChild(item);
            }
        });

        window.history.replaceState({}, document.title, window.location.pathname);
    })
    .catch(() => {
        document.getElementById('dashboard').style.display = 'none';
        document.getElementById('login').style.display = 'grid';
        document.getElementById('msg').textContent = 'Login link expired or invalid. Request a new link.';
    });
}

function showTicketForm(){
    document.getElementById('ticketForm').style.display = 'block';
}

function submitTicket(){
    const requestType = document.getElementById('requestType').value;
    const ticketMessage = document.getElementById('ticketMessage').value.trim();
    const ticketMsg = document.getElementById('ticketMsg');

    if(!requestType || !ticketMessage){
        ticketMsg.textContent = 'Complete all fields.';
        return;
    }

    ticketMsg.textContent = 'Please wait...';

    fetch(TICKET_ENDPOINT, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            name: currentUser.name,
            email: currentUser.email,
            business: currentUser.business,
            subject: requestType,
            message: ticketMessage
        })
    })
    .then(() => {
        ticketMsg.textContent = 'Your request was submitted.';
        document.getElementById('ticketForm').reset();
    })
    .catch(() => {
        ticketMsg.textContent = 'Something went wrong.';
    });
}
</script>
